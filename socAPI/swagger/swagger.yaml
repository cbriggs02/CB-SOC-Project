openapi: 3.0.3
info:
  title: User API
  version: 1.0.0

paths:
  /api/users:
    post:
      summary: Create a new user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserDTO"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully
                  id:
                    type: string
                    format: uuid
                    description: The ID of the created user
        "400":
          description: Validation errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string

    get:
      summary: Get all users
      tags:
        - Users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GetUserResponse"

  /api/users/{id}:
    get:
      summary: Get user by ID
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the user to retrieve
      responses:
        "200":
          description: The requested user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponse"

    delete:
      summary: Delete a user by ID
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the user to delete
      responses:
        "204":
          description: User deleted successfully
        "404":
          description: User not found
        "400":
          description: Invalid ID

  /api/users/{userId}/password:
    patch:
      summary: Change user password
      tags:
        - Users
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
          description: The user's UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordDTO"
      responses:
        "200":
          description: Password changed successfully
        "400":
          description: Invalid input or password policy failure
        "404":
          description: User not found
        "500":
          description: Internal server error

components:
  schemas:
    CreateUserDTO:
      type: object
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
        lastName:
          type: string
          minLength: 2
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
          maxLength: 16
      required:
        - firstName
        - lastName
        - email
        - password

    GetUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
      required:
        - id
        - fullName
        - email

    ChangePasswordDTO:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          minLength: 12
          maxLength: 16
          example: CurrentPassword123!
        newPassword:
          type: string
          minLength: 12
          maxLength: 16
          example: StrongPassword123!
